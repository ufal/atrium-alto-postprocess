services:
  alto:
    image: ghcr.io/ufal/atrium-alto-postprocess:${ATRIUM_VERSION:-dev}
    build:
      context: .
      args:
        ATRIUM_RUNNER_IMAGE: ghcr.io/ufal/atrium-alto-postprocess:${ATRIUM_VERSION:-dev}
        ATRIUM_RUNNER_REPO: https://github.com/ufal/atrium-alto-postprocess
        ATRIUM_RUNNER_REF: ${ATRIUM_RUNNER_REF:-dev}
    environment:
      ATRIUM_RUNNER_IMAGE: ghcr.io/ufal/atrium-alto-postprocess:${ATRIUM_VERSION:-dev}
      ATRIUM_RUNNER_REPO: https://github.com/ufal/atrium-alto-postprocess
      ATRIUM_RUNNER_REF: ${ATRIUM_RUNNER_REF:-dev}
      HF_HOME: /cache/huggingface
    volumes:
      - ./data:/data
      - hf-cache:/cache/huggingface
      - alto-models:/app/models          # persists lid.176.bin (seeded from image on first run)
      - ./config_langID.txt:/app/config_langID.txt:ro

  # API profile — only starts with: docker compose --profile api up
  api:
    extends: alto
    profiles: ["api"]
    entrypoint: ["python", "service/text_api.py"]
    environment:
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8080,http://localhost:5500}
    ports:
      - "8000:8000"

volumes:
  hf-cache:
  alto-models: