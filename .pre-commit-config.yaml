# Full atrium-project template (docs/templates/.pre-commit-config.example.yaml).
# Uses the same Ruff rules as ./ruff.toml so local hooks and CI agree. The
# shellcheck hook is kept because this repo ships setup_api_server.sh.
#
# Install once per clone:  pip install pre-commit && pre-commit install
# Verify latest hook revs:  pre-commit autoupdate
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0          # PARAM: pre-commit autoupdate to pin latest
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=1024"]   # keep model/data blobs out of git

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18          # PARAM: pre-commit autoupdate
    hooks:
      - id: ruff          # lint (reads ./ruff.toml)
      - id: ruff-format   # formatter

  # setup_api_server.sh is the shell surface for this repo:
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0         # PARAM: pre-commit autoupdate
    hooks:
      - id: shellcheck
        args: ["-e", "SC1091"]   # don't follow sourced files that aren't present
