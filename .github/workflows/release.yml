# atrium-alto-postprocess — automated GitHub Release
#
# On a v* tag, create a GitHub Release with auto-generated notes and attach a
# packaged service bundle. The Docker image is published separately by docker.yml.

name: Automated Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # required to create the Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Package service artifact
        run: |
          mkdir -p atrium-service
          cp -r service/ atrium-service/ 2>/dev/null || true
          cp README.md atrium-service/ 2>/dev/null || true
          zip -r service_bundle.zip atrium-service/ -x "*/__pycache__/*" "*/.git/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            service_bundle.zip
