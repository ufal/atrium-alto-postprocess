name: docker
on:
  pull_request:
  push:
    # (#21) Trigger on the project's real integration branches (CONTRIBUTING.md
    # uses test/master) plus main; the stray per-feature claude/* branch was removed.
    branches: ["main", "master", "test"]
    tags: ["v*"]
  release:
    types: [published]
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ufal/atrium-alto-postprocess
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Action majors bumped to their Node 24 runtimes: GitHub forces JS actions
      # onto Node 24 from 2026-06-16 and removes Node 20 in Sep 2026, so the old
      # v4/v5/v3/v6 pins were emitting deprecation warnings and would soon break.
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential g++
      - run: pip install --index-url https://download.pytorch.org/whl/cpu torch
      - run: pip install -r requirements.txt -r service/requirements.txt -r requirements-test.txt
      - run: pytest -m "not slow"
  build-and-push:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v5
      - uses: docker/login-action@v4
        with: { registry: "${{ env.REGISTRY }}", username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=sha
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            ATRIUM_RUNNER_REPO=https://github.com/${{ github.repository }}
            ATRIUM_RUNNER_REF=${{ github.sha }}
            ATRIUM_RUNNER_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}