name: Docker Build & Publish

on:
  push:
    # (#21) Triggers normalized to project integration branches plus main
    branches: [main, master, test]
    tags: ['v*']
  pull_request:
    branches: [main, master, test]
  release:
    types: [published]

jobs:
  build:
    uses: ufal/atrium-project/.github/workflows/docker-tool.reusable.yml@master
    secrets: inherit
    with:
      image-name: ufal/atrium-alto-postprocess
      apt-packages: build-essential g++
      pre-install-torch: torch
      requirements: requirements.txt service/requirements.txt requirements-test.txt