name: Docker Build & Publish

on:
  push:
    # (#21) Triggers normalized to project integration branches plus main
    branches: [master, test]
    tags: ['v*']
  pull_request:
    branches: [master, test]
  release:
    types: [published]

jobs:
  build:
    permissions:
      contents: read
      packages: write
    uses: ufal/atrium-project/.github/workflows/docker-tool.reusable.yml@test
    secrets: inherit
    with:
      image-name: ufal/atrium-alto-postprocess
      apt-packages: build-essential g++
      pre-install-torch: torch
      requirements: setup/requirements.txt service/requirements.txt setup/requirements-test.txt
