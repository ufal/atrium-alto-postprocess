[pytest]
# ── Discovery ──────────────────────────────────────────────────────────────
testpaths   = tests
python_files   = test_*.py
python_classes = Test*
python_functions = test_*

# ── Path ───────────────────────────────────────────────────────────────────
# Makes the repo root importable so that `from text_util_langID import …`
# and `from atrium_paradata import …` resolve without installing a package.
pythonpath = .

# ── Markers ────────────────────────────────────────────────────────────────
markers =
    slow: marks tests that require ML models, GPU, or network access.
          Deselect with:  pytest -m "not slow"

# ── Output ─────────────────────────────────────────────────────────────────
addopts = --tb=short -q
